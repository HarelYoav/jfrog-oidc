name: "JFrog-GitHub OIDC Integration"
on: push



# This is required as per
# https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-cloud-providers#adding-permissions-settings
permissions:
  id-token: write
  contents: read
jobs:
  build:
     runs-on: ubuntu-latest
     # container:
     #   image: elinaf.jfrog.io/jordanta-docker-local/jfrog-mvn-yoah-rt
     #   credentials:
     #     username: ${{ secrets.JF_USER }}
     #     password: ${{ secrets.JF_TOKEN }}
     steps:
       - name: Print
         run: env | sort
       - name: Checkout
         uses: actions/checkout@v4
       - name: Setup JFrog CLI
         uses: jfrog/setup-jfrog-cli@v4
         env:  
           JF_URL: ${{ secrets.JF_URL }}
           
         #   JF_USER: ${{ secrets.JF_USER }}
         #   JF_PASSWORD: ${{ secrets.JF_TOKEN }}
           # JF_ACCESS_TOKEN: ${{ secrets.JF_TOKEN }}
         with:
           oidc-provider-name: 'github-oidc'
           version: latest
       - name: Ping Artifactory
         run: |

          jf rt cl example-repo-local/
          jf xr cl /api/v1/watches
